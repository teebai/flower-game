    <ellipse cx="175" cy="108" rx="13" ry="26" transform="rotate(135 175 138)"/>
    <ellipse cx="175" cy="108" rx="13" ry="26" transform="rotate(180 175 138)"/>
    <ellipse cx="175" cy="108" rx="13" ry="26" transform="rotate(225 175 138)"/>
    <ellipse cx="175" cy="108" rx="13" ry="26" transform="rotate(270 175 138)"/>
    <ellipse cx="175" cy="108" rx="13" ry="26" transform="rotate(315 175 138)"/>
