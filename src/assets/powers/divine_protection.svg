  </g>
  <!-- smiley face -->
  <circle cx="168.5" cy="135" r="2.4" fill="#3A3A3A"/>
  <circle cx="181.5" cy="135" r="2.4" fill="#3A3A3A"/>
  <path d="M168 141 q7 7 14 0" fill="none" stroke="#3A3A3A" stroke-width="2.6" stroke-linecap="round"/>
