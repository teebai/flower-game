  <path d="M176 204 C190 198 202 202 208 216 C192 220 180 216 176 204 z" fill="#7CB342" stroke="#3A3A3A" stroke-width="3.5"/>
  <!-- ground -->
  <ellipse cx="176" cy="240" rx="44" ry="8" fill="#A9C97F" opacity="0.8"/>
