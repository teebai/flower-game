    <path d="M258 196 l3 7 7 3 -7 3 -3 7 -3 -7 -7 -3 7 -3 z"/>
  </g>
  <!-- halo -->
  <ellipse cx="175" cy="76" rx="32" ry="9" fill="none" stroke="#E3B93C" stroke-width="7"/>
  <ellipse cx="175" cy="76" rx="32" ry="9" fill="none" stroke="#FFF3C4" stroke-width="2.5"/>
